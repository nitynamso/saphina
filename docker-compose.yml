services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=wagtail_db
      - POSTGRES_USER=wagtail_user
      - POSTGRES_PASSWORD=wagtail_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagtail_user -d wagtail_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://wagtail_user:wagtail_password@db:5432/wagtail_db
      - DEBUG=1
      - SECRET_KEY=tu_clave_secreta_temporal
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume: