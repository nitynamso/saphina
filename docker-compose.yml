version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: saphina_db
    restart: always
    volumes:
      - saphina_db_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saphina_internal

  web:
    build: .
    container_name: saphina_app
    restart: always
    # Gunicorn es el motor real de producción
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn saphinagroup.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - saphina_static:/app/static
      - saphina_media:/app/media
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - saphina_internal
      - red_proxy

networks:
  saphina_internal:
    driver: bridge
  red_proxy:
    external: true

volumes:
  saphina_db_data:
  saphina_static:
  saphina_media: