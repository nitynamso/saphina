<section class="bg-white pt-16 lg:pt-24 pb-8 lg:pb-12 text-center px-[5%]">
    <h2 class="text-[2rem] lg:text-[2.5rem] font-bold text-dark mb-4">{{ value.title }}</h2>
    {% if value.subtitle %}
        <p class="text-[1.1rem] lg:text-[1.2rem] text-gray-700 max-w-2xl mx-auto">
            {{ value.subtitle }}
        </p>
    {% endif %}
</section>
