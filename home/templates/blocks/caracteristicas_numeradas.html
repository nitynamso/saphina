{% load wagtailcore_tags %}

<section class="bg-grayAlt py-20 lg:py-28">
    <div class="w-full max-w-premium mx-auto px-[5%] lg:px-[2.5%]">
        
        <div class="mb-16 lg:mb-20 text-left">
            <h2 class="text-[2.5rem] lg:text-[3rem] font-bold text-dark mb-5">{{ self.title }}</h2>
            <p class="text-[1.25rem] lg:text-[1.5rem] text-textDark">{{ self.subtitle }}</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-16 gap-x-16">
            {% for reason in self.reasons %}
                <div class="flex items-start gap-8">
                    <span class="text-primary text-[1.5rem] font-semibold flex items-center shrink-0 after:content-[''] after:inline-block after:w-12 after:h-[2px] after:bg-primary after:ml-4">
                        {{ forloop.counter|stringformat:"02d" }}
                    </span>
                    <div class="-mt-1">
                        <h3 class="text-[1.6rem] lg:text-[1.75rem] font-medium text-dark mb-4 leading-tight">{{ reason.title|linebreaksbr }}</h3>
                        <p class="text-[1rem] lg:text-[1.125rem] leading-relaxed text-[#4a4a4a]">{{ reason.description }}</p>
                    </div>
                </div>
            {% endfor %}
        </div>

    </div>
</section>
