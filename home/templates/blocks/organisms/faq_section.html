{% load wagtailcore_tags %}

<section class="bg-grayAlt pt-[100px]  ">
    <div class="max-w-4xl mx-auto text-center px-6">
        <h2 class="text-[2.5rem] lg:text-[4rem] font-bold text-dark leading-tight mb-6">
            {{ value.title }}
        </h2>
        <div class="text-[1.1rem] lg:text-[1.6rem] text-gray-600 leading-relaxed">
            {{ value.subtitle|richtext }}
        </div>
    </div>
</section>

<section class="pb-32 pt-16  bg-white">
    <div class="max-w-5xl mx-auto px-[5%]">
        <div class="flex flex-col gap-4" data-accordion>
            {% for item in value.items %}
            <div class="accordion-item border border-gray-100 rounded-xl overflow-hidden shadow-sm transition-all duration-300 hover:shadow-md">
                <button class="accordion-header w-full flex justify-between items-center p-6 text-left bg-white focus:outline-none group" type="button">
                    <span class="text-[1.1rem] lg:text-[1.5rem] font-bold text-dark group-hover:text-primary transition-colors">
                        {{ item.question }}
                    </span>
                    <i class="fa-solid fa-chevron-down text-gray-400 accordion-icon transition-transform duration-300"></i>
                </button>
                <div class="accordion-content bg-gray-50 overflow-hidden">
                    <div class="p-6 text-gray-600 leading-relaxed lg:text-[1.2rem] text-[1.1rem]">
                        {{ item.answer|richtext }}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
