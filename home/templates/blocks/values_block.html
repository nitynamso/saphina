{% load wagtailimages_tags %}

<section class="py-16 lg:py-24">
    <div class="max-w-[125rem] mx-auto px-[5%]">
        
        <!-- Encabezado de dos columnas -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-12 items-center mb-16">
            <div class="text-center lg:text-left">
                <h2 class="text-[2.5rem] lg:text-[3.5rem] font-bold text-dark leading-tight">
                    {{ self.title|linebreaksbr }}
                </h2>
            </div>
            <div class="text-center lg:text-left">
                <p class="text-[1.15rem] lg:text-[1.25rem] text-[#333] leading-relaxed">
                    {{ self.subtitle_text }}
                </p>
            </div>
        </div>

        <!-- Grid de tarjetas de valores -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for value in self.values %}
            <div class="bg-white border border-gray-100 p-8 rounded-lg shadow-sm hover:shadow-xl transition-shadow duration-300">
                <!-- Ícono: local o URL -->
                {% if value.icon %}
                    {% image value.icon height-48 as icon_img %}
                    <img src="{{ icon_img.url }}" class="h-12 w-auto mb-6" alt="{{ value.title }}">
                {% elif value.icon_url %}
                    <img src="{{ value.icon_url }}" class="h-12 w-auto mb-6" alt="{{ value.title }}">
                {% endif %}
                <h3 class="text-[1.5rem] font-bold text-dark mb-4">{{ value.title }}</h3>
                <p class="text-[1.05rem] text-[#555] leading-relaxed">{{ value.description }}</p>
            </div>
            {% endfor %}
        </div>

    </div>
</section>
